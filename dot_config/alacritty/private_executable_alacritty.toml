[env]
TERM = "alacritty"
COLORTERM = "truecolor"

[general]
import = ["~/.config/alacritty/themes/themes/enfocado_dark.toml"]
working_directory = '/Users/mocer'

[terminal]

[terminal.shell]
program = '/usr/local/bin/fish'

[font]
size = 15.0

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font"
style = "Retina"

[font.offset]
x = 0
y = -2

[window]
padding.x = 5
padding.y = 5

decorations = "Buttonless"

opacity = 0.9
blur = true
